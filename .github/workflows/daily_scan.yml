name: Scan Quotidien Pépites Rim

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: self-hosted

    steps:
      - name: Récupérer le code de Rim
        uses: actions/checkout@v4

      - name: Installer les outils (Playwright & Supabase)
        run: |
          python -m pip install --upgrade pip
          pip install supabase playwright
          python -m playwright install chromium

      - name: Lancer la recherche de pépites
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # SOLUTION : Force l'affichage des emojis sur Windows
          PYTHONIOENCODING: utf-8
        run: python rim.py
