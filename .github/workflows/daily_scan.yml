name: Scan Quotidien Pépites Rim

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: self-hosted
    
    steps:
      - name: Récupérer le code de Rim
        uses: actions/checkout@v4

      # On saute l'installation de Python car ton PC l'a déjà
      # On s'assure juste que les dépendances sont là
      - name: Vérifier les outils (Playwright & Supabase)
        run: |
          pip install supabase playwright
          playwright install chromium

      - name: Lancer la recherche de pépites
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python rim.py
