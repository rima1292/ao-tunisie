name: Scan Quotidien Pépites Rim

# 1. QUAND LANCER LE ROBOT ?
on:
  schedule:
    - cron: '0 8 * * *' # Tous les matins à 8h00 (UTC)
  workflow_dispatch:      # Permet de le lancer manuellement d'un clic

# 2. QUE DOIT FAIRE LE ROBOT ?
jobs:
  scrape:
    runs-on: self-hosted # Utilise ton PC (le runner local)

    steps:
      - name: Récupérer le code de Rim
        uses: actions/checkout@v4

      - name: Installer les outils (Playwright & Supabase)
        run: |
          python -m pip install --upgrade pip
          pip install supabase playwright
          python -m playwright install chromium

      - name: Lancer la recherche de pépites
        env:
          # On récupère tes clés secrètes depuis les "Settings" de GitHub
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python rim.py
